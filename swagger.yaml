---
components:
  schemas:
    ErrorResponse:
      properties:
        code:
          type: string
        correlationId:
          type: string
        message:
          type: string
      type: object
    OAuthErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          enum: [invalid_request, invalid_client, invalid_grant, unauthorized_client, unsupported_grant_type, invalid_scope]
        error_description:
          type: string
    Policy:
      type: object
      properties:
        id:
          type: string
        policyNumber:
          type: string
        premiumAmount:
          type: integer
        accountBalance:
          type: integer
        currency:
          type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PolicyListResponse:
      properties:
        data:
          items:
            $ref: '#/components/schemas/Policy'
          type: array
        pagination:
          properties:
            page:
              type: integer
            size:
              type: integer
            total:
              type: integer
          type: object
      type: object
    CreatePolicyRequest:
      properties:
        policyNumber:
          type: string
          example: "P-999"
        premiumAmount:
          type: integer
          example: 1500000
        accountBalance:
          type: integer
          example: 1500000
        currency:
          type: string
          example: "VND"  
      required:
          - policyNumber
          - premiumAmount
          - currency
      type: object
    UpdatePolicyRequest:
      properties:
        policyNumber:
          type: string
          example: "P-001"
        premiumAmount:
          type: integer
          example: 1500000
        currency:
          type: string
          example: "VND"  
        status:
          type: string
          example: "ACTIVE"
      required:
          - policyNumber
          - premiumAmount
          - currency
          - status
      type: object
    PartialUpdatePolicyRequest:
      properties:
        premiumAmount:
          type: integer
          example: 2000000
      type: object
    TopUpRequest:
      properties:
        amount:
          example: 500000
          type: integer
      required:
        - amount
      type: object
  securitySchemes:
    basicAuth:
      scheme: basic
      type: http
    bearerAuth:
      bearerFormat: JWT
      scheme: bearer
      type: http
      description: |
        Bearer token supports:
        - Client token (type=client, scope-based)
        - User token (type=user, role-based)
info:
  title: Policy API
  version: 1.0.0
  description: |
    Policy management API.

    📌 Availability Class: 24x7
    📌 SLA: 99.9% uptime
    📌 Maintenance Window: Sunday 02:00 - 03:00 ICT
    📌 Consumer expectation: Always available except planned downtime
    
    📌 Latency Class: Sub-second
    📌 Target P95 < 300ms
    📌 Target P99 < 1s
  x-availability:
    class: "24x7"
    sla: "99.9%"
    maintenance_window: "Sunday 02:00-03:00 ICT"
    support: "L1 24x7, L2 business hours"
  x-latency:
    class: "sub-second"
    p95: "300ms"
    p99: "1s"
openapi: 3.0.0
paths:
  /oauth/token:
    post:
      summary: Generate access token
      description: |
        Supports 2 grant types:
        - `client_credentials` (Service account, requires Basic Auth)
        - `authorization_code` (User account simulation, requires `code`)
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - grant_type
              properties:
                grant_type:
                  type: string
                  enum: [client_credentials, authorization_code]
                  example: client_credentials
                code:
                  type: string
                  description: Required when `grant_type = authorization_code`
                  example: "YWRtaW4="
            examples:
              clientCredentials:
                summary: Service account login
                value:
                  grant_type: client_credentials
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                type: object
                required: [token_type, expires_in]
                properties:
                  access_token:
                    type: string
                    pattern: '^eyJ[\w-]+\.[\w-]+\.[\w-]+$'  # JWT regex
                  token_type:
                    type: string
                    enum: [Bearer]
                  expires_in:
                    type: integer
                    minimum: 1
                  scope:
                    type: string
        '400':
          description: Invalid request or unsupported grant type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthErrorResponse'
              example:
                error: "invalid_request"
                error_description: "Missing grant_type"
        '401':
          description: Invalid client credentials or auth code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthErrorResponse'
              example:
                error: "invalid_code"
                error_description: "Invalid client credentials or auth code"
  /oauth/authorize:
    get:
      summary: Simulate authorization (get auth code)
      description: |
        Simulate Authorization Code flow.
        Returns a base64 encoded code based on username.
      parameters:
        - in: query
          name: username
          required: true
          schema:
            type: string
          example: admin
      responses:
        '200':
          description: Authorization code generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
        '401':
          description: Invalid user
  /policies:
    get:
      parameters:
        - description: Filter by status (ACTIVE / INACTIVE)
          in: query
          name: status
          schema:
            type: string
        - in: query
          name: page
          schema:
            default: 1
            type: integer
        - in: query
          name: size
          schema:
            default: 10
            type: integer
        - in: header
          name: X-Debug-Mode
          required: false
          schema:
            type: string
            example: "true"
          description: |
            Enable debug mode.
            Only works for USER token with role ADMIN or DEV.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyListResponse'
          description: OK
      security:
        - bearerAuth: []
      summary: Get all policies
      description: |
        - Opaque identifiers are used to prevent enumeration attacks.
        - Internal ID is only exposed in debug mode.
        - Debug mode requires USER token with ADMIN or DEV role.
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePolicyRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
              examples:
                example1:
                  value:
                    id: "pol_185495e455ae"
                    policyNumber: "P-001"
                    premiumAmount: 1000000
                    accountBalance: "****1000"
                    currency: "VND"
                    status: "ACTIVE"
          description: Created
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request
      security:
        - bearerAuth: []
      summary: Create policy
  /policies/{id}:
    get:
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "pol_b2c3d4e5f6a7"
        - in: header
          name: X-Debug-Mode
          required: false
          schema:
            type: string
            example: "true"
          description: |
            Enable debug mode.
            Only works for USER token with role ADMIN or DEV. 
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
          description: OK
          headers:
            ETag:
              description: Current resource version
              schema:
                type: string
        '404':
          description: Not found
      security:
        - bearerAuth: []
      summary: Get policy by ID
      description: |
        - Opaque identifiers are used to prevent enumeration attacks.
        - Internal ID is only exposed in debug mode.
        - Debug mode requires USER token with ADMIN or DEV role.
    put:
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "pol_b2c3d4e5f6a7"
        - in: header
          name: If-Match
          required: true
          schema:
            type: string
          example: "1"
          description: Required for optimistic locking (version check)
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePolicyRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
          description: Updated
          headers:
            ETag:
              description: Current resource version
              schema:
                type: string
      security:
        - bearerAuth: []
      summary: Update policy
    patch: 
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "pol_b2c3d4e5f6a7"
        - in: header
          name: If-Match
          required: true
          schema:
            type: string
          example: "1"
          description: Required for optimistic locking (version check)
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartialUpdatePolicyRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
          description: Updated
          headers:
            ETag:
              description: Current resource version
              schema:
                type: string
        '404':
          description: Not found
    delete:
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "pol_d4e5f6a7b8c9"
      responses:
        '204':
          description: Deleted
      security:
        - bearerAuth: []
      summary: Delete policy
  /policies/{id}/deactivate:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "pol_c3d4e5f6a7b8"
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
          description: Policy deactivated
      security:
        - bearerAuth: []
      summary: Deactivate policy
  /policies/{id}/top-up:
    post:
      description: |
        Add money to policy account balance.
        ⚠️ This operation is NOT idempotent by default (amount is added).
        ✅ Using Idempotency-Key ensures the request is processed only once.
        📌 Availability: 24x7 Mission Critical
        📌 SLA: 99.95%
        📌 Idempotency required for safe retries
        📌 Latency: Sub-second
        📌 Timeout recommended: 2s
        📌 Retry policy: exponential backoff
      x-availability:
        class: "24x7-critical"
        sla: "99.95%"
      x-latency:
        class: "sub-second"
        p95: "200ms"
        p99: "500ms"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "pol_a1b2c3d4e5f6"
        - description: |
            Unique key to ensure request is executed only once.
            Same key + same request → no duplicate processing.

          in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopUpRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
          description: Top-up successful
          headers:
            ETag:
              description: Current resource version
              schema:
                type: string
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Invalid request
        '401':
          description: Unauthorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "INVALID_TOKEN"
                message: "Invalid token"
                correlationId: "00000000-0000-0000-0000-000000000001"
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Policy not found
      security:
        - bearerAuth: []
      summary: Top-up policy account balance (Idempotency demo)
servers:
  - url: http://localhost:3000