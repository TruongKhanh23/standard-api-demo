---
components:
  schemas:
    ErrorResponse:
      properties:
        code:
          type: string
        correlationId:
          type: string
        message:
          type: string
      type: object
    Policy:
      properties:
        createdAt:
          format: date-time
          type: string
        currency:
          type: string
        id:
          type: string
        policyNumber:
          type: string
        premiumAmount:
          type: integer
        status:
          enum: [ACTIVE, INACTIVE]
          type: string
        updatedAt:
          format: date-time
          type: string
      type: object
    PolicyListResponse:
      properties:
        data:
          items:
            $ref: '#/components/schemas/Policy'
          type: array
        pagination:
          properties:
            page:
              type: integer
            size:
              type: integer
            total:
              type: integer
          type: object
      type: object
    PolicyRequest:
      properties:
        currency:
          type: string
        policyNumber:
          type: string
        premiumAmount:
          type: integer
      required:
        - policyNumber
        - premiumAmount
        - currency
      type: object
  securitySchemes:
    basicAuth:
      scheme: basic
      type: http
    bearerAuth:
      bearerFormat: JWT
      scheme: bearer
      type: http
info:
  title: Policy API
  version: 1.0.0
openapi: 3.0.0
paths:
  /oauth/token:
    post:
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              properties:
                grant_type:
                  example: client_credentials
                  type: string
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  access_token:
                    type: string
                  expires_in:
                    type: integer
                  scope:
                    type: string
                  token_type:
                    example: Bearer
                    type: string
                type: object
          description: Token issued
        '401':
          description: Invalid client
      security:
        - basicAuth: []
      summary: Generate access token (Client Credentials)
  /policies:
    get:
      parameters:
        - description: Filter by status (ACTIVE / INACTIVE)
          in: query
          name: status
          schema:
            type: string
        - in: query
          name: page
          schema:
            default: 1
            type: integer
        - in: query
          name: size
          schema:
            default: 10
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyListResponse'
          description: OK
      security:
        - bearerAuth: []
      summary: Get all policies
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
          description: Created
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request
      security:
        - bearerAuth: []
      summary: Create policy
  /policies/{id}:
    get:
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
          description: OK
        '404':
          description: Not found
      security:
        - bearerAuth: []
      summary: Get policy by ID
    patch: null
    put:
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
          description: Updated
      security:
        - bearerAuth: []
      summary: Update policy
  /policies/{id}/deactivate:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
          description: Policy deactivated
      security:
        - bearerAuth: []
      summary: Deactivate policy
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: string
  requestBody:
    content:
      application/json:
        schema:
          type: object
    required: true
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Policy'
      description: Updated
    '404':
      description: Not found
    delete:
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
      security:
        - bearerAuth: []
      summary: Delete policy
  security:
    - bearerAuth: []
  summary: Partially update policy
servers:
  - url: http://localhost:3000